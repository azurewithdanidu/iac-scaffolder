# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - iac-scaffolder

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        run: |
          npm ci
          npm run build
          npm prune --production

      - name: Verify build artifacts
        run: |
          echo "Checking .next folder..."
          ls -la .next/
          ls -la .next/server/
          echo ".next folder verified!"

      - name: Create deployment package
        run: |
          # List what's getting zipped
          echo "=== Contents to be zipped ==="
          ls -lah .next/ node_modules/ public/ src/ *.js *.json 2>/dev/null || true
          
          # Create zip with specific files and folders
          zip -r release.zip \
            .next/ \
            node_modules/ \
            public/ \
            src/ \
            server.js \
            package.json \
            package-lock.json \
            next.config.js \
            tsconfig.json \
            tailwind.config.ts \
            postcss.config.js \
            next-env.d.ts
          
          # Verify zip contents
          echo "=== Zip contents verification ==="
          unzip -l release.zip | head -50
          
          # Check zip size
          ls -lh release.zip

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4F803AF224B54FCD9265488D9C9E55E9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CDA62288056C49CFB0CD97E93DFD2F97 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_60659316F27E4DA1B099D1546324D882 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'iac-scaffolder'
          slot-name: 'Production'
          package: release.zip
          